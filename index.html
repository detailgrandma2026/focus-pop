<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Focus Pop - Firefly Hunt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a4d2a, #0d2e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            padding: 16px;
            position: relative;
        }

        .mute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a6e3f;
            border: 2px solid #ffec9f;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .game-container {
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .game-panel {
            background: #2a6e3f;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
            border: 1px solid #ffec9f88;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            font-size: 2rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 3px 3px 0 #2c4b1e;
            animation: gentleBounce 2s ease-in-out infinite;
        }

        .firefly-icon {
            display: inline-block;
            animation: floatGlow 1.5s ease-in-out infinite;
            font-size: 1.8rem;
        }

        .game-subtitle {
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            font-size: 0.8rem;
            color: #FFEC9F;
            text-shadow: 1px 1px 0 #1e3b2a;
            margin-top: -5px;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.8; }
            50% { transform: translateY(-3px) scale(1.1); opacity: 1; }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            background: #1e3b2a;
            padding: 10px 15px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #0f281b;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: #f9e7b3;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: inset 0 1px 3px #00000033, 0 2px 3px #ffffff22;
        }

        .game-area {
            position: relative;
            width: min(85vw, 85vh, 450px);
            height: min(85vw, 85vh, 450px);
            border-radius: 28px;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: inset 0 0 0 3px #ffec9f, 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            background-size: cover;
            background-position: center;
        }

        .firefly {
            position: absolute;
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.05s ease;
        }

        .distraction {
            position: absolute;
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 20;
            display: none;
        }

        .message-area {
            text-align: center;
            margin-top: 12px;
        }

        #winMessage {
            background: #ffd966cc;
            backdrop-filter: blur(8px);
            padding: 10px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c4b1e;
        }

        button {
            background: #ffcf4a;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: #2d4a1c;
            margin-top: 8px;
            cursor: pointer;
            box-shadow: 0 3px 0 #b46f1a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b46f1a;
        }

        .hidden {
            display: none;
        }

        .bg-elf { background-image: url('fatelf.png'); }
        .bg-forest { background-image: url('ff-forest.png'); }
        .bg-night { background-image: url('nightsky.png'); }
        .flip-bg { transform: scaleX(-1); }
        .flip-bg .firefly, .flip-bg .distraction { transform: scaleX(-1); }
    </style>
</head>
<body>

<button class="mute-btn" id="muteBtn">🔊</button>

<div class="game-container">
    <div class="game-panel">
        <div class="game-header">
            <h1 class="game-title"><span class="firefly-icon">✨</span> Focus Pop <span class="firefly-icon">✨</span></h1>
            <p class="game-subtitle">pop the fireflies, don't get distracted!</p>
        </div>

        <div class="stats">
            <div class="stat-box"><span>✨</span> <span id="score">0</span></div>
            <div class="stat-box"><span>🎯</span> Goal <span id="goal">10</span></div>
            <div class="stat-box"><span>🏆</span> Level <span id="levelNum">1</span></div>
            <div id="timerContainer" class="stat-box hidden">⏱️ <span id="timerDisplay">0</span> sec</div>
        </div>

        <div id="gameArea" class="game-area bg-elf">
            <div id="firefly" class="firefly"></div>
            <div id="butterfly" class="distraction" style="background-image: url('butterfly.png');"></div>
            <div id="bee" class="distraction" style="background-image: url('bee.png');"></div>
            <div id="mosquito" class="distraction" style="background-image: url('mosquito.png');"></div>
            <div id="dragonfly" class="distraction" style="background-image: url('dragonfly.png');"></div>
        </div>

        <div class="message-area">
            <div id="winMessage" class="hidden">
                🎉 You win! 🎉<br>
                <button id="nextLevelBtn">Next Level →</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== GAME STATE ==========
    let currentLevel = 1;
    let score = 0;
    let goal = 10;
    let timeLeft = 0;
    let timerInterval = null;
    let gameActive = true;
    let bounceInterval = null;
    let windowWidth = 450;
    let windowHeight = 450;
    let fireflyX = 200;
    let fireflyY = 200;
    let velocityX = 4;
    let velocityY = 3;
    let activeDistraction = null;
    let distractionInterval = null;
    let dragonflyLoop = null;

    // ========== DOM ELEMENTS ==========
    const gameArea = document.getElementById('gameArea');
    const firefly = document.getElementById('firefly');
    const scoreSpan = document.getElementById('score');
    const goalSpan = document.getElementById('goal');
    const levelSpan = document.getElementById('levelNum');
    const winMessageDiv = document.getElementById('winMessage');
    const timerContainer = document.getElementById('timerContainer');
    const timerDisplaySpan = document.getElementById('timerDisplay');

    const butterflyEl = document.getElementById('butterfly');
    const beeEl = document.getElementById('bee');
    const mosquitoEl = document.getElementById('mosquito');
    const dragonflyEl = document.getElementById('dragonfly');

    // ========== SOUNDS ==========
    const heySound = new Audio('hey.mp3');
    const buzzSound = new Audio('buzz.mp3');
    const smackSound = new Audio('smack.mp3');
    const swooshSound = new Audio('swoosh.mp3');
    swooshSound.loop = true;

    // ========== MUSIC ==========
    const bgMusic = new Audio('boinggame.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.1;
    let isMuted = false;

    function startMusic() {
        if (!isMuted && bgMusic.paused) {
            bgMusic.play().catch(e => console.log('Music start:', e));
        }
        document.removeEventListener('click', startMusic);
        document.removeEventListener('touchstart', startMusic);
    }
    document.addEventListener('click', startMusic);
    document.addEventListener('touchstart', startMusic);

    document.getElementById('muteBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        isMuted = !isMuted;
        if (isMuted) {
            bgMusic.pause();
            document.getElementById('muteBtn').innerText = '🔇';
        } else {
            bgMusic.play().catch(e => console.log('Music resume:', e));
            document.getElementById('muteBtn').innerText = '🔊';
        }
    });

    // ========== FIREFLY IMAGES ==========
    const fireflyImages = {
        1: 'orangeff.png',
        2: 'greenff.png',
        3: 'pinkff.png',
        4: 'ltpinkff.png',
        5: 'blueff.png',
        6: 'purpleff.png',
        7: 'ltblueff.png'
    };

    function setFireflyImage() {
        firefly.style.backgroundImage = `url('${fireflyImages[currentLevel]}')`;
    }

    // ========== MOVEMENT & BOUNDS ==========
    function updateBounds() {
        const rect = gameArea.getBoundingClientRect();
        windowWidth = rect.width;
        windowHeight = rect.height;
        fireflyX = Math.min(Math.max(fireflyX, 0), windowWidth - 80);
        fireflyY = Math.min(Math.max(fireflyY, 0), windowHeight - 80);
    }

    function addRandomTwist() {
        if (!gameActive) return;
        velocityX += (Math.random() - 0.5) * 1.2;
        velocityY += (Math.random() - 0.5) * 1.2;
        const speed = Math.hypot(velocityX, velocityY);
        const maxSpeed = currentLevel === 7 ? 9.1 : 7;
        const minSpeed = currentLevel === 7 ? 3.25 : 2.5;
        if (speed > maxSpeed) {
            velocityX = (velocityX / speed) * maxSpeed;
            velocityY = (velocityY / speed) * maxSpeed;
        } else if (speed < minSpeed) {
            velocityX = (velocityX / speed) * minSpeed;
            velocityY = (velocityY / speed) * minSpeed;
        }
    }

    function moveFirefly() {
        if (!gameActive) return;
        fireflyX += velocityX;
        fireflyY += velocityY;

        if (fireflyX <= 0) {
            fireflyX = 0;
            velocityX = Math.abs(velocityX);
            addRandomTwist();
        }
        if (fireflyX >= windowWidth - 80) {
            fireflyX = windowWidth - 80;
            velocityX = -Math.abs(velocityX);
            addRandomTwist();
        }
        if (fireflyY <= 0) {
            fireflyY = 0;
            velocityY = Math.abs(velocityY);
            addRandomTwist();
        }
        if (fireflyY >= windowHeight - 80) {
            fireflyY = windowHeight - 80;
            velocityY = -Math.abs(velocityY);
            addRandomTwist();
        }

        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
    }

    // ========== DISTRACTIONS ==========
    function stopDistraction() {
        if (distractionInterval) clearInterval(distractionInterval);
        if (dragonflyLoop) {
            dragonflyLoop.pause();
            dragonflyLoop.currentTime = 0;
            dragonflyLoop = null;
        }
        butterflyEl.style.display = 'none';
        beeEl.style.display = 'none';
        mosquitoEl.style.display = 'none';
        dragonflyEl.style.display = 'none';
        activeDistraction = null;
    }

    function spawnDistraction() {
        if (!gameActive) return;
        stopDistraction();

        let type = null;
        if (currentLevel === 3 || currentLevel === 4) type = 'butterfly';
        else if (currentLevel === 5) type = 'bee';
        else if (currentLevel === 6) type = 'mosquito';
        else if (currentLevel === 7) type = 'dragonfly';
        if (!type) return;

        let el, sound = null, loopSound = null;
        if (type === 'butterfly') { el = butterflyEl; sound = heySound; }
        else if (type === 'bee') { el = beeEl; sound = buzzSound; }
        else if (type === 'mosquito') { el = mosquitoEl; sound = smackSound; }
        else { el = dragonflyEl; loopSound = swooshSound; }

        const x = Math.random() * (windowWidth - 80);
        let y = -80;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.display = 'block';
        activeDistraction = { el, type, sound };

        if (loopSound) {
            loopSound.currentTime = 0;
            loopSound.play().catch(e => console.log('loop error', e));
            dragonflyLoop = loopSound;
        } else if (sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log('spawn sound error', e));
        }

        const driftSpeed = (type === 'dragonfly') ? 5 : 2;
        const driftXRange = (type === 'dragonfly') ? 8 : 4;

        distractionInterval = setInterval(() => {
            if (!gameActive || !activeDistraction) return;
            y += driftSpeed;
            let newX = x + (Math.random() - 0.5) * driftXRange;
            newX = Math.min(Math.max(newX, 0), windowWidth - 80);
            el.style.left = newX + 'px';
            el.style.top = y + 'px';
            if (y > windowHeight) {
                stopDistraction();
                setTimeout(() => spawnDistraction(), Math.random() * 5000 + 3000);
            }
        }, 50);
    }

    function popDistraction(el, sound) {
        if (!gameActive || !activeDistraction || activeDistraction.el !== el) return;
        if (sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log('pop sound error', e));
        }
        stopDistraction();
        setTimeout(() => spawnDistraction(), Math.random() * 5000 + 3000);
    }

    // ========== POP FIREFLY ==========
    function popFirefly(event) {
        if (!gameActive) return;
        event.stopPropagation();

        score++;
        scoreSpan.innerText = score;

        firefly.style.transform = 'scale(0.7)';
        setTimeout(() => { firefly.style.transform = ''; }, 100);

        if (score >= goal) {
            gameActive = false;
            if (bounceInterval) clearInterval(bounceInterval);
            if (timerInterval) clearInterval(timerInterval);
            stopDistraction();
            winMessageDiv.classList.remove('hidden');
            firefly.style.opacity = '0.5';
        } else {
            fireflyX = Math.random() * (windowWidth - 80);
            fireflyY = Math.random() * (windowHeight - 80);
            firefly.style.left = fireflyX + 'px';
            firefly.style.top = fireflyY + 'px';
            velocityX += (Math.random() - 0.5) * 2;
            velocityY += (Math.random() - 0.5) * 2;
            addRandomTwist();
        }
    }

    // ========== TIMER ==========
    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = seconds;
        timerDisplaySpan.innerText = timeLeft;
        timerContainer.classList.remove('hidden');

        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameActive = false;
                if (bounceInterval) clearInterval(bounceInterval);
                stopDistraction();
                winMessageDiv.innerHTML = '⏰ Time\'s up!<br><button id="resetBtn">Try Again</button>';
                winMessageDiv.classList.remove('hidden');
                firefly.style.opacity = '0.5';
                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => resetLevel(currentLevel));
                }
            } else {
                timeLeft--;
                timerDisplaySpan.innerText = timeLeft;
            }
        }, 1000);
    }

    // ========== LEVEL MANAGEMENT ==========
    function resetLevel(level) {
        currentLevel = level;
        score = 0;
        gameActive = true;
        scoreSpan.innerText = score;
        levelSpan.innerText = level;
        stopDistraction();
        winMessageDiv.classList.add('hidden');
        winMessageDiv.innerHTML = '🎉 You win! 🎉<br><button id="nextLevelBtn">Next Level →</button>';
        firefly.style.opacity = '1';

        // Set speed
        const baseSpeed = (currentLevel === 7) ? 5.2 : 4;
        velocityX = baseSpeed + (Math.random() - 0.5) * 2;
        velocityY = baseSpeed + (Math.random() - 0.5) * 2;

        // Level configuration
        if (currentLevel === 1) {
            goal = 10;
            gameArea.className = 'game-area bg-elf';
            gameArea.classList.remove('flip-bg');
            setFireflyImage();
            if (timerInterval) clearInterval(timerInterval);
            timerContainer.classList.add('hidden');
        } else if (currentLevel === 2) {
            goal = 20;
            gameArea.className = 'game-area bg-elf';
            gameArea.classList.add('flip-bg');
            setFireflyImage();
            startTimer(75);
        } else if (currentLevel === 3) {
            goal = 35;
            gameArea.className = 'game-area bg-forest';
            gameArea.classList.remove('flip-bg');
            setFireflyImage();
            if (timerInterval) clearInterval(timerInterval);
            timerContainer.classList.add('hidden');
            setTimeout(() => spawnDistraction(), 1000);
        } else if (currentLevel === 4) {
            goal = 35;
            gameArea.className = 'game-area bg-forest';
            gameArea.classList.remove('flip-bg');
            setFireflyImage();
            startTimer(75);
            setTimeout(() => spawnDistraction(), 1000);
        } else if (currentLevel === 5) {
            goal = 40;
            gameArea.className = 'game-area bg-night';
            gameArea.classList.remove('flip-bg');
            setFireflyImage();
            if (timerInterval) clearInterval(timerInterval);
            timerContainer.classList.add('hidden');
            setTimeout(() => spawnDistraction(), 1000);
        } else if (currentLevel === 6) {
            goal = 40;
            gameArea.className = 'game-area bg-night';
            gameArea.classList.remove('flip-bg');
            setFireflyImage();
            startTimer(75);
            setTimeout(() => spawnDistraction(), 1000);
        } else if (currentLevel === 7) {
            goal = 50;
            gameArea.className = 'game-area bg-night';
            gameArea.classList.remove('flip-bg');
            setFireflyImage();
            startTimer(60);
            setTimeout(() => spawnDistraction(), 1000);
        }

        goalSpan.innerText = goal;
        updateBounds();

        fireflyX = Math.random() * (windowWidth - 80);
        fireflyY = Math.random() * (windowHeight - 80);
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';

        if (bounceInterval) clearInterval(bounceInterval);
        bounceInterval = setInterval(() => moveFirefly(), 1000 / 30);

        // Next level button
        const nextBtn = document.getElementById('nextLevelBtn');
        if (nextBtn) {
            const newBtn = nextBtn.cloneNode(true);
            nextBtn.parentNode.replaceChild(newBtn, nextBtn);
            newBtn.addEventListener('click', () => {
                if (currentLevel === 1) resetLevel(2);
                else if (currentLevel === 2) resetLevel(3);
                else if (currentLevel === 3) resetLevel(4);
                else if (currentLevel === 4) resetLevel(5);
                else if (currentLevel === 5) resetLevel(6);
                else if (currentLevel === 6) resetLevel(7);
                else {
                    alert('✨ You beat all 7 levels! ✨\nThanks for playing! 🎉');
                    resetLevel(1);
                }
            });
        }
    }

    // ========== EVENT LISTENERS ==========
    firefly.addEventListener('click', popFirefly);
    butterflyEl.addEventListener('click', () => popDistraction(butterflyEl, heySound));
    beeEl.addEventListener('click', () => popDistraction(beeEl, buzzSound));
    mosquitoEl.addEventListener('click', () => popDistraction(mosquitoEl, smackSound));
    dragonflyEl.addEventListener('click', () => popDistraction(dragonflyEl, null));

    window.addEventListener('resize', () => {
        updateBounds();
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
    });

    // ========== START GAME ==========
    updateBounds();
    resetLevel(1);
</script>
</body>
</html>
