<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Focus Pop - Firefly Hunt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a4d2a, #0d2e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            padding: 16px;
            position: relative;
        }

        .mute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a6e3f;
            border: 2px solid #ffec9f;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .game-container {
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .game-panel {
            background: #2a6e3f;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
            border: 1px solid #ffec9f88;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            font-size: 2.2rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 3px 3px 0 #2c4b1e;
            animation: gentleBounce 2s ease-in-out infinite;
        }

        .firefly-icon {
            display: inline-block;
            animation: floatGlow 1.5s ease-in-out infinite;
            font-size: 2rem;
        }

        .game-subtitle {
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            font-size: 0.9rem;
            color: #FFEC9F;
            text-shadow: 1px 1px 0 #1e3b2a;
            margin-top: -5px;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.8; }
            50% { transform: translateY(-3px) scale(1.1); opacity: 1; }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #1e3b2a;
            padding: 12px 20px;
            border-radius: 60px;
            color: #f9e7b3;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-box, .goal-box, .timer-box {
            background: #0f281b;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.5rem;
            box-shadow: inset 0 1px 3px #00000033, 0 2px 3px #ffffff22;
        }

        .timer-box {
            font-size: 1.2rem;
        }

        .game-area {
            position: relative;
            background-size: cover;
            background-position: center;
            width: min(85vw, 85vh, 500px);
            height: min(85vw, 85vh, 500px);
            border-radius: 28px;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: inset 0 0 0 3px #ffec9f, 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .game-area.bg-elf { background-image: url('fatelf.png'); }
        .game-area.bg-forest { background-image: url('ff-forest.png'); }
        .game-area.bg-night { background-image: url('nightsky.png'); }

        .game-area.flip-bg { transform: scaleX(-1); }
        .game-area.flip-bg .firefly,
        .game-area.flip-bg .butterfly {
            transform: scaleX(-1);
        }

        .firefly {
            position: absolute;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 10;
        }

        .butterfly, .bee, .mosquito, .dragonfly {
            position: absolute;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 20;
            display: none;
        }
        .butterfly { background-image: url('butterfly.png'); }
        .bee { background-image: url('bee.png'); }
        .mosquito { background-image: url('mosquito.png'); }
        .dragonfly { background-image: url('dragonfly.png'); }

        .message-area {
            text-align: center;
            margin-top: 12px;
        }

        #winMessage {
            background: #ffd966cc;
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #2c4b1e;
        }

        button {
            background: #ffcf4a;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d4a1c;
            margin-top: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b46f1a;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<button class="mute-btn" id="muteBtn">🔊</button>

<div class="game-container">
    <div class="game-panel">
        <div class="game-header">
            <h1 class="game-title">
                <span class="firefly-icon">✨</span>
                Focus Pop
                <span class="firefly-icon">✨</span>
            </h1>
            <p class="game-subtitle">pop the fireflies, don't get distracted!</p>
        </div>

        <div class="stats">
            <div class="score-box"><span>✨</span> <span id="score">0</span></div>
            <div class="goal-box"><span>🎯</span> Goal <span id="goal">10</span></div>
            <div id="timerContainer" class="timer-box hidden">⏱️ <span id="timerDisplay">0</span> sec</div>
        </div>
        <div id="gameArea" class="game-area bg-elf">
            <div id="firefly" class="firefly"></div>
            <div id="butterfly" class="butterfly"></div>
            <div id="bee" class="bee"></div>
            <div id="mosquito" class="mosquito"></div>
            <div id="dragonfly" class="dragonfly"></div>
        </div>
        <div class="message-area">
            <div id="winMessage" class="hidden">🎉 You win! 🎉<br><button id="nextLevelBtn">Next Level →</button></div>
        </div>
    </div>
</div>

<script>
    let currentLevel = 1, score = 0, goal = 10, timeLeft = 0;
    let timerInterval = null, gameActive = true, bounceInterval = null;
    let windowWidth = 500, windowHeight = 500;
    let fireflyX = 200, fireflyY = 200;
    let velocityX = 4, velocityY = 3;
    let activeDistraction = null, distractionInterval = null;
    let currentLoopSound = null;

    const gameArea = document.getElementById('gameArea');
    const firefly = document.getElementById('firefly');
    const scoreSpan = document.getElementById('score');
    const goalSpan = document.getElementById('goal');
    const winMessageDiv = document.getElementById('winMessage');
    const timerContainer = document.getElementById('timerContainer');
    const timerDisplaySpan = document.getElementById('timerDisplay');

    const butterflyEl = document.getElementById('butterfly');
    const beeEl = document.getElementById('bee');
    const mosquitoEl = document.getElementById('mosquito');
    const dragonflyEl = document.getElementById('dragonfly');

    const heySound = new Audio('hey.mp3');
    const buzzSound = new Audio('buzz.mp3');
    const smackSound = new Audio('smack.mp3');
    const swooshSound = new Audio('swoosh.mp3');
    swooshSound.loop = true;

    const bgMusic = new Audio('boinggame.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    let isMuted = false;

    function tryPlayMusic() {
        if (!isMuted && bgMusic.paused) {
            bgMusic.play().catch(e => console.log('Music start:', e));
        }
        document.removeEventListener('click', tryPlayMusic);
        document.removeEventListener('touchstart', tryPlayMusic);
    }
    document.addEventListener('click', tryPlayMusic);
    document.addEventListener('touchstart', tryPlayMusic);

    document.getElementById('muteBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        isMuted = !isMuted;
        if (isMuted) {
            bgMusic.pause();
            document.getElementById('muteBtn').innerText = '🔇';
        } else {
            bgMusic.play().catch(e => console.log('Music resume:', e));
            document.getElementById('muteBtn').innerText = '🔊';
        }
    });

    const fireflyImages = {
        1: 'orangeff.png', 2: 'greenff.png',
        3: 'pinkff.png', 4: 'ltpinkff.png',
        5: 'blueff.png', 6: 'purpleff.png', 7: 'ltblueff.png'
    };

    function updateGameBounds() {
        const rect = gameArea.getBoundingClientRect();
        windowWidth = rect.width;
        windowHeight = rect.height;
        fireflyX = Math.min(Math.max(fireflyX, 0), windowWidth - 90);
        fireflyY = Math.min(Math.max(fireflyY, 0), windowHeight - 90);
    }

    function setFireflyImage(level) {
        firefly.style.backgroundImage = `url('${fireflyImages[level]}')`;
    }

    function addRandomTwist() {
        if (!gameActive) return;
        velocityX += (Math.random() - 0.5) * 1.2;
        velocityY += (Math.random() - 0.5) * 1.2;
        let speed = Math.hypot(velocityX, velocityY);
        let maxSpeed = currentLevel === 7 ? 9.1 : 7;
        let minSpeed = currentLevel === 7 ? 3.25 : 2.5;
        if (speed > maxSpeed) { velocityX = (velocityX / speed) * maxSpeed; velocityY = (velocityY / speed) * maxSpeed; }
        else if (speed < minSpeed) { velocityX = (velocityX / speed) * minSpeed; velocityY = (velocityY / speed) * minSpeed; }
    }

    function moveFirefly() {
        if (!gameActive) return;
        fireflyX += velocityX;
        fireflyY += velocityY;
        if (fireflyX <= 0) { fireflyX = 0; velocityX = Math.abs(velocityX); addRandomTwist(); }
        if (fireflyX >= windowWidth - 90) { fireflyX = windowWidth - 90; velocityX = -Math.abs(velocityX); addRandomTwist(); }
        if (fireflyY <= 0) { fireflyY = 0; velocityY = Math.abs(velocityY); addRandomTwist(); }
        if (fireflyY >= windowHeight - 90) { fireflyY = windowHeight - 90; velocityY = -Math.abs(velocityY); addRandomTwist(); }
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
    }

    function stopDistraction() {
        if (distractionInterval) clearInterval(distractionInterval);
        if (currentLoopSound) { currentLoopSound.pause(); currentLoopSound.currentTime = 0; currentLoopSound = null; }
        butterflyEl.style.display = 'none';
        beeEl.style.display = 'none';
        mosquitoEl.style.display = 'none';
        dragonflyEl.style.display = 'none';
        activeDistraction = null;
    }

    function spawnDistraction() {
        if (!gameActive) return;
        stopDistraction();
        let type = null;
        if (currentLevel === 3 || currentLevel === 4) type = 'butterfly';
        else if (currentLevel === 5) type = 'bee';
        else if (currentLevel === 6) type = 'mosquito';
        else if (currentLevel === 7) type = 'dragonfly';
        if (!type) return;
        
        let el, sound = null, loopSound = null;
        if (type === 'butterfly') { el = butterflyEl; sound = heySound; }
        else if (type === 'bee') { el = beeEl; sound = buzzSound; }
        else if (type === 'mosquito') { el = mosquitoEl; sound = smackSound; }
        else { el = dragonflyEl; loopSound = swooshSound; }
        
        let x = Math.random() * (windowWidth - 90);
        let y = -90;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.display = 'block';
        activeDistraction = { el, type, sound };
        
        if (loopSound) {
            loopSound.currentTime = 0;
            loopSound.play().catch(e=>console.log('loop error',e));
            currentLoopSound = loopSound;
        } else if (sound && (type === 'butterfly' || type === 'bee')) {
            sound.play().catch(e=>console.log('sound error',e));
        }
        
        let driftSpeed = (type === 'dragonfly') ? 5 : 2;
        let driftXRange = (type === 'dragonfly') ? 8 : 4;
        distractionInterval = setInterval(() => {
            if (!gameActive || !activeDistraction) { clearInterval(distractionInterval); return; }
            y += driftSpeed;
            x += (Math.random() - 0.5) * driftXRange;
            x = Math.min(Math.max(x, 0), windowWidth - 90);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            if (y > windowHeight) {
                stopDistraction();
                setTimeout(() => spawnDistraction(), Math.random() * 5000 + 3000);
            }
        }, 50);
    }

    function popDistraction(el, sound) {
        if (!gameActive || !activeDistraction || activeDistraction.el !== el) return;
        if (sound) sound.play().catch(e=>console.log('pop sound error',e));
        stopDistraction();
        setTimeout(() => spawnDistraction(), Math.random() * 5000 + 3000);
    }

    function popFirefly(event) {
        if (!gameActive) return;
        event.stopPropagation();
        score++;
        scoreSpan.innerText = score;
        firefly.style.transform = 'scale(0.7)';
        setTimeout(() => { firefly.style.transform = ''; }, 100);
        if (score >= goal) {
            gameActive = false;
            if (bounceInterval) clearInterval(bounceInterval);
            if (timerInterval) clearInterval(timerInterval);
            stopDistraction();
            winMessageDiv.classList.remove('hidden');
            firefly.style.opacity = '0.5';
        } else {
            fireflyX = Math.random() * (windowWidth - 90);
            fireflyY = Math.random() * (windowHeight - 90);
            firefly.style.left = fireflyX + 'px';
            firefly.style.top = fireflyY + 'px';
            velocityX += (Math.random() - 0.5) * 2;
            velocityY += (Math.random() - 0.5) * 2;
            addRandomTwist();
        }
    }

    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = seconds;
        timerDisplaySpan.innerText = timeLeft;
        timerContainer.classList.remove('hidden');
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameActive = false;
                if (bounceInterval) clearInterval(bounceInterval);
                stopDistraction();
                winMessageDiv.innerHTML = '⏰ Time\'s up!<br><button id="resetBtn">Try Again</button>';
                winMessageDiv.classList.remove('hidden');
                firefly.style.opacity = '0.5';
                document.getElementById('resetBtn').addEventListener('click', () => resetLevel(currentLevel));
            } else {
                timeLeft--;
                timerDisplaySpan.innerText = timeLeft;
            }
        }, 1000);
    }

    function resetLevel(level) {
        currentLevel = level;
        score = 0;
        gameActive = true;
        scoreSpan.innerText = 0;
        stopDistraction();
        winMessageDiv.classList.add('hidden');
        winMessageDiv.innerHTML = '🎉 You win! 🎉<br><button id="nextLevelBtn">Next Level →</button>';
        firefly.style.opacity = '1';
        
        let baseSpeed = 4;
        if (currentLevel === 7) baseSpeed = 5.2;
        velocityX = baseSpeed + (Math.random() - 0.5) * 2;
        velocityY = baseSpeed + (Math.random() - 0.5) * 2;
        
        if (currentLevel === 1) {
            goal = 10; gameArea.className = 'game-area bg-elf'; gameArea.classList.remove('flip-bg');
            setFireflyImage(1); if (timerInterval) clearInterval(timerInterval); timerContainer.classList.add('hidden');
        } else if (currentLevel === 2) {
            goal = 20; gameArea.className = 'game-area bg-elf'; gameArea.classList.add('flip-bg');
            setFireflyImage(2); startTimer(75);
        } else if (currentLevel === 3) {
            goal = 35; gameArea.className = 'game-area bg-forest'; gameArea.classList.remove('flip-bg');
            setFireflyImage(3); if (timerInterval) clearInterval(timerInterval); timerContainer.classList.add('hidden');
            setTimeout(() => spawnDistraction(), 2000);
        } else if (currentLevel === 4) {
            goal = 35; gameArea.className = 'game-area bg-forest'; gameArea.classList.remove('flip-bg');
            setFireflyImage(4); startTimer(75); setTimeout(() => spawnDistraction(), 2000);
        } else if (currentLevel === 5) {
            goal = 40; gameArea.className = 'game-area bg-night'; gameArea.classList.remove('flip-bg');
            setFireflyImage(5); if (timerInterval) clearInterval(timerInterval); timerContainer.classList.add('hidden');
            setTimeout(() => spawnDistraction(), 2000);
        } else if (currentLevel === 6) {
            goal = 40; gameArea.className = 'game-area bg-night'; gameArea.classList.remove('flip-bg');
            setFireflyImage(6); startTimer(75); setTimeout(() => spawnDistraction(), 2000);
        } else if (currentLevel === 7) {
            goal = 50; gameArea.className = 'game-area bg-night'; gameArea.classList.remove('flip-bg');
            setFireflyImage(7); startTimer(60); setTimeout(() => spawnDistraction(), 2000);
        }
        
        goalSpan.innerText = goal;
        updateGameBounds();
        fireflyX = Math.random() * (windowWidth - 90);
        fireflyY = Math.random() * (windowHeight - 90);
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
        
        if (bounceInterval) clearInterval(bounceInterval);
        bounceInterval = setInterval(() => moveFirefly(), 1000 / 30);
        
        const nextBtn = document.getElementById('nextLevelBtn');
        if (nextBtn) {
            nextBtn.replaceWith(nextBtn.cloneNode(true));
            const newNextBtn = document.getElementById('nextLevelBtn');
            newNextBtn.addEventListener('click', () => {
                if (currentLevel === 1) resetLevel(2);
                else if (currentLevel === 2) resetLevel(3);
                else if (currentLevel === 3) resetLevel(4);
                else if (currentLevel === 4) resetLevel(5);
                else if (currentLevel === 5) resetLevel(6);
                else if (currentLevel === 6) resetLevel(7);
                else { alert('✨ You beat all 7 levels! ✨\nThanks for playing! 🎉'); resetLevel(1); }
            });
        }
    }
    
    firefly.addEventListener('click', popFirefly);
    butterflyEl.addEventListener('click', () => popDistraction(butterflyEl, heySound));
    beeEl.addEventListener('click', () => popDistraction(beeEl, buzzSound));
    mosquitoEl.addEventListener('click', () => popDistraction(mosquitoEl, smackSound));
    dragonflyEl.addEventListener('click', () => popDistraction(dragonflyEl, null));
    window.addEventListener('resize', () => {
        updateGameBounds();
        fireflyX = Math.min(Math.max(fireflyX, 0), windowWidth - 90);
        fireflyY = Math.min(Math.max(fireflyY, 0), windowHeight - 90);
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
    });
    
    updateGameBounds();
    resetLevel(1);
</script>
</body>
</html>
