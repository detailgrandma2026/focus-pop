<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Focus Pop - Firefly Hunt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a4d2a, #0d2e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            padding: 16px;
        }

        .game-container {
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .game-panel {
            background: #2a6e3f;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
            border: 1px solid #ffec9f88;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            font-size: 2.2rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 3px 3px 0 #2c4b1e;
            animation: gentleBounce 2s ease-in-out infinite;
            letter-spacing: 2px;
        }

        .firefly-icon {
            display: inline-block;
            animation: floatGlow 1.5s ease-in-out infinite;
            font-size: 2rem;
        }

        .firefly-icon:first-child {
            animation-delay: 0s;
        }

        .firefly-icon:last-child {
            animation-delay: 0.75s;
        }

        .game-subtitle {
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            font-size: 0.9rem;
            color: #FFEC9F;
            text-shadow: 1px 1px 0 #1e3b2a;
            opacity: 0.9;
            margin-top: -5px;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.8; text-shadow: 0 0 2px #ffea80; }
            50% { transform: translateY(-3px) scale(1.1); opacity: 1; text-shadow: 0 0 12px #ffea80; }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #1e3b2a;
            padding: 12px 20px;
            border-radius: 60px;
            color: #f9e7b3;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-box, .goal-box {
            background: #0f281b;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.5rem;
            box-shadow: inset 0 1px 3px #00000033, 0 2px 3px #ffffff22;
        }

        .score-box span, .goal-box span {
            font-size: 0.9rem;
            margin-right: 8px;
        }

        .timer-box {
            background: #0f281b;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f9e7b3;
            box-shadow: inset 0 1px 3px #00000033, 0 2px 3px #ffffff22;
        }

        .game-area {
            position: relative;
            background-size: cover;
            background-position: center;
            width: min(85vw, 85vh, 500px);
            height: min(85vw, 85vh, 500px);
            border-radius: 28px;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: inset 0 0 0 3px #ffec9f, 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        /* Level 1 & 2 background (fat elf) */
        .game-area.bg-elf {
            background-image: url('fatelf.png');
        }

        /* Level 3 & 4 background (forest) */
        .game-area.bg-forest {
            background-image: url('ff-forest.png');
        }

        .game-area.flip-bg {
            transform: scaleX(-1);
        }

        .game-area.flip-bg .firefly,
        .game-area.flip-bg .butterfly {
            transform: scaleX(-1);
        }

        .firefly {
            position: absolute;
            width: 90px;
            height: 90px;
            background: none;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            will-change: left, top;
            z-index: 10;
        }

        .butterfly {
    position: absolute;
    width: 90px;
    height: 90px;
    background-image: url('butterfly.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    z-index: 20;
    display: block;
}
        .message-area {
            text-align: center;
            margin-top: 12px;
        }

        #winMessage {
            background: #ffd966cc;
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #2c4b1e;
        }

        button {
            background: #ffcf4a;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d4a1c;
            margin-top: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b46f1a;
            transition: 0.05s linear;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b46f1a;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="game-header">
            <h1 class="game-title">
                <span class="firefly-icon">✨</span>
                Focus Pop
                <span class="firefly-icon">✨</span>
            </h1>
            <p class="game-subtitle">pop the fireflies, don't get distracted!</p>
        </div>

        <div class="stats">
            <div class="score-box"><span>✨</span> <span id="score">0</span></div>
            <div class="goal-box"><span>🎯</span> 0 / <span id="goal">10</span></div>
            <div id="timerContainer" class="timer-box hidden">⏱️ <span id="timerDisplay">0</span> sec</div>
        </div>
        <div id="gameArea" class="game-area bg-elf">
            <div id="firefly" class="firefly"></div>
            <div id="butterfly" class="butterfly hidden"></div>
        </div>
        <div class="message-area">
            <div id="winMessage" class="hidden">🎉 You win! 🎉<br><button id="nextLevelBtn">Next Level →</button></div>
        </div>
    </div>
</div>

<script>
    // GAME STATE
    let currentLevel = 1;
    let score = 0;
    let goal = 10;
    let timeLeft = 0;
    let timerInterval = null;
    let gameActive = true;
    let bounceInterval = null;
    let butterflyInterval = null;
    let windowWidth = 500;
    let windowHeight = 500;

    // Firefly position
    let fireflyX = 200;
    let fireflyY = 200;
    let velocityX = 4;
    let velocityY = 3;

    // Butterfly position
    let butterflyX = -100;
    let butterflyY = -100;
    let butterflyActive = false;

    // DOM elements
    const gameArea = document.getElementById('gameArea');
    const firefly = document.getElementById('firefly');
    const butterfly = document.getElementById('butterfly');
    const scoreSpan = document.getElementById('score');
    const goalSpan = document.getElementById('goal');
    const winMessageDiv = document.getElementById('winMessage');
    const timerContainer = document.getElementById('timerContainer');
    const timerDisplaySpan = document.getElementById('timerDisplay');

    // Sound effect (play on butterfly pop)
    const heySound = new Audio('hey.mp3');

    // Firefly images per level
    const fireflyImages = {
        1: 'orangeff.png',
        2: 'greenff.png',
        3: 'pinkff.png',
        4: 'ltpinkff.png'
    };

    function updateGameBounds() {
    const rect = gameArea.getBoundingClientRect();
    windowWidth = rect.width;
    windowHeight = rect.height;
    fireflyX = Math.min(Math.max(fireflyX, 0), windowWidth - 70);
    fireflyY = Math.min(Math.max(fireflyY, 0), windowHeight - 70);
}
    function setFireflyImage(level) {
        const imgName = fireflyImages[level];
        if (imgName) {
            firefly.style.backgroundImage = `url('${imgName}')`;
        }
    }

    function moveFirefly() {
        if (!gameActive) return;
        fireflyX += velocityX;
        fireflyY += velocityY;
        
        if (fireflyX <= 0) {
            fireflyX = 0;
            velocityX = Math.abs(velocityX);
            addRandomTwist();
        }
        if (fireflyX >= windowWidth - 70) {
            fireflyX = windowWidth - 70;
            velocityX = -Math.abs(velocityX);
            addRandomTwist();
        }
        if (fireflyY <= 0) {
            fireflyY = 0;
            velocityY = Math.abs(velocityY);
            addRandomTwist();
        }
        if (fireflyY >= windowHeight - 70) {
            fireflyY = windowHeight - 70;
            velocityY = -Math.abs(velocityY);
            addRandomTwist();
        }
        
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
    }
    
    function addRandomTwist() {
        if (!gameActive) return;
        velocityX += (Math.random() - 0.5) * 1.2;
        velocityY += (Math.random() - 0.5) * 1.2;
        let speed = Math.hypot(velocityX, velocityY);
        let maxSpeed = 7;
        let minSpeed = 2.5;
        if (speed > maxSpeed) {
            velocityX = (velocityX / speed) * maxSpeed;
            velocityY = (velocityY / speed) * maxSpeed;
        } else if (speed < minSpeed) {
            velocityX = (velocityX / speed) * minSpeed;
            velocityY = (velocityY / speed) * minSpeed;
        }
    }

    function spawnButterfly() {
        if (!gameActive) return;
        if (!butterflyActive) {
            butterflyActive = true;
            butterflyX = Math.random() * (windowWidth - 50);
            butterflyY = -50;
            butterfly.style.left = butterflyX + 'px';
            butterfly.style.top = butterflyY + 'px';
            butterfly.classList.remove('hidden');
            
            // Drift downward at an angle
            let driftInterval = setInterval(() => {
                if (!gameActive || !butterflyActive) {
                    clearInterval(driftInterval);
                    return;
                }
                butterflyY += 2;
                butterflyX += (Math.random() - 0.5) * 4;
                butterflyX = Math.min(Math.max(butterflyX, 0), windowWidth - 50);
                butterfly.style.left = butterflyX + 'px';
                butterfly.style.top = butterflyY + 'px';
                
                if (butterflyY > windowHeight) {
                    butterflyActive = false;
                    butterfly.classList.add('hidden');
                    clearInterval(driftInterval);
                    
                    // Respawn after random delay (3-8 seconds)
                    setTimeout(() => spawnButterfly(), Math.random() * 5000 + 3000);
                }
            }, 50);
            
            // Store interval to clean up on level reset
            if (window.butterflyDriftInterval) clearInterval(window.butterflyDriftInterval);
            window.butterflyDriftInterval = driftInterval;
        }
    }

    function popButterfly(event) {
        if (!gameActive) return;
        event.stopPropagation();
        heySound.play();
        butterflyActive = false;
        butterfly.classList.add('hidden');
        if (window.butterflyDriftInterval) clearInterval(window.butterflyDriftInterval);
        
        // Respawn later
        setTimeout(() => spawnButterfly(), Math.random() * 5000 + 3000);
    }

    function popFirefly(event) {
        if (!gameActive) return;
        event.stopPropagation();
        
        score++;
        scoreSpan.innerText = score;
        
        firefly.style.transform = 'scale(0.7)';
        setTimeout(() => { firefly.style.transform = ''; }, 100);
        
        if (score >= goal) {
            gameActive = false;
            if (bounceInterval) clearInterval(bounceInterval);
            if (timerInterval) clearInterval(timerInterval);
            if (window.butterflyDriftInterval) clearInterval(window.butterflyDriftInterval);
            butterflyActive = false;
            butterfly.classList.add('hidden');
            winMessageDiv.classList.remove('hidden');
            firefly.style.opacity = '0.5';
            firefly.style.cursor = 'default';
        } else {
            fireflyX = Math.random() * (windowWidth - 70);
            fireflyY = Math.random() * (windowHeight - 70);
            firefly.style.left = fireflyX + 'px';
            firefly.style.top = fireflyY + 'px';
            
            velocityX += (Math.random() - 0.5) * 2;
            velocityY += (Math.random() - 0.5) * 2;
            addRandomTwist();
        }
    }
    
    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = seconds;
        timerDisplaySpan.innerText = timeLeft;
        timerContainer.classList.remove('hidden');
        
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameActive = false;
                if (bounceInterval) clearInterval(bounceInterval);
                if (window.butterflyDriftInterval) clearInterval(window.butterflyDriftInterval);
                winMessageDiv.innerHTML = '⏰ Time\'s up!<br><button id="resetBtn">Try Again</button>';
                winMessageDiv.classList.remove('hidden');
                firefly.style.opacity = '0.5';
                butterfly.classList.add('hidden');
                document.getElementById('resetBtn').addEventListener('click', () => resetLevel(currentLevel));
            } else {
                timeLeft--;
                timerDisplaySpan.innerText = timeLeft;
            }
        }, 1000);
    }

    function resetLevel(level) {
        currentLevel = level;
        score = 0;
        gameActive = true;
        scoreSpan.innerText = 0;
        
        // Clean up butterfly
        butterflyActive = false;
        butterfly.classList.add('hidden');
        if (window.butterflyDriftInterval) clearInterval(window.butterflyDriftInterval);
        
        // Reset win message
        winMessageDiv.classList.add('hidden');
        winMessageDiv.innerHTML = '🎉 You win! 🎉<br><button id="nextLevelBtn">Next Level →</button>';
        firefly.style.opacity = '1';
        firefly.style.cursor = 'pointer';
        
        // Level-specific setup
        if (currentLevel === 1) {
            goal = 10;
            gameArea.className = 'game-area bg-elf';
            gameArea.classList.remove('flip-bg');
            setFireflyImage(1);
            if (timerInterval) clearInterval(timerInterval);
            timerContainer.classList.add('hidden');
        } else if (currentLevel === 2) {
            goal = 20;
            gameArea.className = 'game-area bg-elf';
            gameArea.classList.add('flip-bg');
            setFireflyImage(2);
            startTimer(75);
        } else if (currentLevel === 3) {
            goal = 35;
            gameArea.className = 'game-area bg-forest';
            gameArea.classList.remove('flip-bg');
            setFireflyImage(3);
            if (timerInterval) clearInterval(timerInterval);
            timerContainer.classList.add('hidden');
            // Start butterfly distraction
            setTimeout(() => spawnButterfly(), 2000);
        } else if (currentLevel === 4) {
            goal = 35;
            gameArea.className = 'game-area bg-forest';
            gameArea.classList.remove('flip-bg');
            setFireflyImage(4);
            startTimer(75);
            // Start butterfly distraction
            setTimeout(() => spawnButterfly(), 2000);
        }
        
        goalSpan.innerText = goal;
        updateGameBounds();
        fireflyX = Math.random() * (windowWidth - 70);
        fireflyY = Math.random() * (windowHeight - 70);
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
        
        velocityX = (Math.random() - 0.5) * 5 + 3;
        velocityY = (Math.random() - 0.5) * 5 + 3;
        addRandomTwist();
        
        if (bounceInterval) clearInterval(bounceInterval);
        bounceInterval = setInterval(() => {
            moveFirefly();
        }, 1000 / 30);
        
        // Re-attach next level button event
        const nextBtn = document.getElementById('nextLevelBtn');
        if (nextBtn) {
            nextBtn.replaceWith(nextBtn.cloneNode(true));
            const newNextBtn = document.getElementById('nextLevelBtn');
            newNextBtn.addEventListener('click', () => {
                if (currentLevel === 1) resetLevel(2);
                else if (currentLevel === 2) resetLevel(3);
                else if (currentLevel === 3) resetLevel(4);
                else {
                    alert('✨ More levels coming soon! ✨\nYou beat all 4 levels! 🎉');
                    resetLevel(1);
                }
            });
        }
    }
    
    firefly.addEventListener('click', popFirefly);
    butterfly.addEventListener('click', popButterfly);
    window.addEventListener('resize', () => {
        updateGameBounds();
        fireflyX = Math.min(Math.max(fireflyX, 0), windowWidth - 70);
        fireflyY = Math.min(Math.max(fireflyY, 0), windowHeight - 70);
        firefly.style.left = fireflyX + 'px';
        firefly.style.top = fireflyY + 'px';
    });
    
    updateGameBounds();
    resetLevel(1);
</script>
</body>
</html>
